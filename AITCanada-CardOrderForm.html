<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 1rem 0 2rem; }
h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.sub { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
.meta-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
.section-label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.full { grid-column: 1 / -1; }
input::placeholder, textarea::placeholder { color: var(--color-text-tertiary); }
textarea { resize: vertical; min-height: 48px; font-size: 14px; font-family: var(--font-sans); }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-add { background: var(--color-background-info); border: none; color: var(--color-text-info); font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: var(--border-radius-md); cursor: pointer; }
.btn-clear { background: transparent; border: 0.5px solid var(--color-border-secondary); color: var(--color-text-secondary); font-size: 13px; padding: 8px 14px; border-radius: var(--border-radius-md); cursor: pointer; }
.btn-export { background: var(--color-background-success); border: none; color: var(--color-text-success); font-size: 13px; font-weight: 500; padding: 8px 18px; border-radius: var(--border-radius-md); cursor: pointer; margin-left: auto; }
.btn-export:disabled { opacity: 0.4; cursor: not-allowed; }
.divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 1.5rem 0; }
.order-list { display: flex; flex-direction: column; gap: 10px; }
.empty { text-align: center; padding: 2rem; color: var(--color-text-tertiary); font-size: 13px; border: 0.5px dashed var(--color-border-tertiary); border-radius: var(--border-radius-lg); }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px 14px; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.card-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.card-pos { font-size: 12px; color: var(--color-text-secondary); }
.card-details { font-size: 12px; color: var(--color-text-secondary); line-height: 1.8; }
.card-details span { color: var(--color-text-primary); }
.del-btn { background: transparent; border: none; color: var(--color-text-tertiary); font-size: 18px; line-height: 1; cursor: pointer; padding: 0 2px; }
.del-btn:hover { color: var(--color-text-danger); }
.count-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.count-label { font-size: 13px; color: var(--color-text-secondary); }
.qr-note { font-size: 12px; color: var(--color-text-tertiary); font-style: italic; margin-top: 2px; }
.status { font-size: 13px; color: var(--color-text-success); margin-left: 8px; display: none; }
</style>

<div class="wrap">
  <h2>Business card order form</h2>
  <p class="sub">Fill in each person's details, then download the order doc to send to Reg with the QR code files attached.</p>

  <div class="section-label">Order info</div>
  <div class="meta-row">
    <input id="forg" placeholder="Organization name" />
    <input id="fweek" placeholder="Week of (e.g. April 14, 2026)" />
  </div>

  <div class="section-label">Add a card</div>
  <div class="form-grid">
    <input id="fname" placeholder="Full name" />
    <input id="fpos" placeholder="Job title / position" />
    <input id="faddr" placeholder="Address" class="full" />
    <input id="fphone" placeholder="Phone number" />
    <input id="femail" placeholder="Email address" />
    <input id="fqr" placeholder="QR code filename (e.g. QR_Jane_Smith.png)" class="full" />
    <textarea id="fnotes" placeholder="Notes (optional — e.g. rush, special finish)" class="full"></textarea>
  </div>
  <div class="btn-row" style="margin-bottom: 1.5rem;">
    <button class="btn-add" onclick="addPerson()">+ Add to order</button>
    <button class="btn-clear" onclick="clearForm()">Clear</button>
  </div>

  <hr class="divider" />

  <div class="count-bar">
    <span class="count-label" id="count-label">0 cards in this batch</span>
    <button class="btn-export" id="export-btn" onclick="exportDoc()" disabled>Download order doc</button>
  </div>
  <span class="status" id="status-msg">Generating...</span>
  <div class="order-list" id="order-list">
    <div class="empty">No cards added yet.</div>
  </div>
</div>

<script>
const orders = [];

function addPerson() {
  const name = document.getElementById('fname').value.trim();
  const position = document.getElementById('fpos').value.trim();
  const address = document.getElementById('faddr').value.trim();
  const phone = document.getElementById('fphone').value.trim();
  const email = document.getElementById('femail').value.trim();
  const qrFile = document.getElementById('fqr').value.trim();
  const notes = document.getElementById('fnotes').value.trim();
  if (!name) { document.getElementById('fname').focus(); return; }
  orders.push({ name, position, address, phone, email, qrFile, notes, id: Date.now() });
  clearForm();
  renderList();
}

function clearForm() {
  ['fname','fpos','faddr','fphone','femail','fqr','fnotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fname').focus();
}

function removeOrder(id) {
  const idx = orders.findIndex(o => o.id === id);
  if (idx > -1) orders.splice(idx, 1);
  renderList();
}

function renderList() {
  const list = document.getElementById('order-list');
  const label = document.getElementById('count-label');
  const btn = document.getElementById('export-btn');
  label.textContent = orders.length + ' card' + (orders.length !== 1 ? 's' : '') + ' in this batch';
  btn.disabled = orders.length === 0;
  if (orders.length === 0) {
    list.innerHTML = '<div class="empty">No cards added yet.</div>';
    return;
  }
  list.innerHTML = '';
  orders.forEach((o, i) => {
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML = `
      <div class="card-header">
        <div><div class="card-name">${o.name}</div><div class="card-pos">${o.position || '—'}</div></div>
        <button class="del-btn" onclick="removeOrder(${o.id})">×</button>
      </div>
      <div class="card-details">
        ${o.address ? `<div>Address: <span>${o.address}</span></div>` : ''}
        ${o.phone ? `<div>Phone: <span>${o.phone}</span></div>` : ''}
        ${o.email ? `<div>Email: <span>${o.email}</span></div>` : ''}
        ${o.qrFile ? `<div>QR file: <span>${o.qrFile}</span></div>` : '<div class="qr-note">No QR filename set</div>'}
        ${o.notes ? `<div>Notes: <span>${o.notes}</span></div>` : ''}
      </div>`;
    list.appendChild(d);
  });
}

async function exportDoc() {
  const weekOf = document.getElementById('fweek').value.trim() || new Date().toLocaleDateString('en-CA', { year: 'numeric', month: 'long', day: 'numeric' });
  const orgName = document.getElementById('forg').value.trim() || 'Business card order';
  const payload = JSON.stringify({ orders, weekOf, orgName });

  const btn = document.getElementById('export-btn');
  const status = document.getElementById('status-msg');
  btn.disabled = true;
  status.style.display = 'inline';
  status.textContent = 'Generating...';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Generate a business card order Word document. Here is the order data as JSON:\n\n${payload}\n\nRespond with only: READY`
        }]
      })
    });
    sendPrompt(`Please generate and download the business card order Word doc for this data: ${payload}`);
    status.textContent = 'Request sent — check chat above.';
    setTimeout(() => { status.style.display = 'none'; btn.disabled = false; }, 3000);
  } catch(e) {
    sendPrompt(`Please generate and download the business card order Word doc for this data: ${payload}`);
    status.style.display = 'none';
    btn.disabled = false;
  }
}

renderList();
</script>
